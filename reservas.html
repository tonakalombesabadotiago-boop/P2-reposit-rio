<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Reserva | P02</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header>
        <div class="logo">🏨 ReservaJá</div>
        <nav>
            <a href="index.html">Início</a> | 
            <a href="reservas.html" class="ativo">As Minhas Reservas</a>
        </nav>
    </header>

    <!-- O NOVO BANNER VISUAL COLOCOU-SE AQUI -->
    <div class="banner-imagens">
        <div class="banner-texto">
            <h2>Encontre o seu Voo e Hotel Ideal</h2>
            <p>Tudo o que precisa para a sua próxima viagem, num só lugar.</p>
        </div>
    </div>

    <main class="conteudo-principal">
        <section class="banner-pesquisa">
            <h2>Dados do Cliente & Pagamento</h2>
            <p>Insira os seus dados para armazenar a reserva com segurança no servidor.</p>
            
            <form class="form-pesquisa">
                <div class="grupo-input">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" placeholder="Seu nome aqui" required>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail de Contacto:</label>
                    <input type="email" id="email" placeholder="exemplo@isep.ipp.pt" required>
                </div>

                <div class="grupo-input">
                    <label for="pagamento">Método de Pagamento:</label>
                    <select id="pagamento" name="pagamento">
                        <option value="cc">Cartão de Crédito</option>
                        <option value="mb">Multibanco</option>
                        <option value="mbway">MB WAY</option>
                    </select>
                </div>

                <button type="button" class="btn-procurar" onclick="alert('Reserva processada com sucesso!')">Confirmar e Pagar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - P02 - Sistemas de Reservas Online | DEAPC - ISEP</p>
    </footer>

</body>
</html>
